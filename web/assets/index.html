<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="/manifest.json">
  <title>sprite-agent</title>
  <!-- Apply the persisted desktop "sidebar collapsed" state before first paint so a
       refresh while collapsed doesn't flash the sidebar open. -->
  <script>try{if(localStorage.getItem('sidebarCollapsed')==='1')document.documentElement.setAttribute('data-sidebar','collapsed')}catch(e){}</script>
  <link rel="stylesheet" href="/styles.css">
  <!-- syntax highlighting theme (progressive enhancement; offline-safe) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <h2>Chats</h2>
        <button id="new-chat-btn" title="New chat">+</button>
      </div>
      <div id="sessions-list"></div>
      <div id="fleet-section">
        <div id="fleet-header"><span>Fleet</span><button id="spawn-btn" title="Spawn a worker sprite">+ worker</button></div>
        <div id="fleet-list"></div>
      </div>
    </aside>
    <div id="overlay"></div>

    <main id="main">
      <header>
        <button id="menu-btn">☰</button>
        <h1 id="chat-title">sprite-agent</h1>
        <div id="status">Disconnected</div>
      </header>

      <div id="stage">
      <div id="messages"></div>

      <div id="input-area">
        <div id="image-preview">
          <div id="image-preview-inner">
            <img id="image-preview-img" src="" alt="Preview">
            <span id="image-preview-name"></span>
            <button id="remove-image" title="Remove image">×</button>
          </div>
        </div>
        <div id="input-wrapper">
          <input type="file" id="file-input" accept="image/*,.doc,.docx,.xls,.xlsx,.csv,.txt,.md" hidden>
          <textarea id="input" placeholder="How can I help you?" rows="1" enterkeyhint="send"
                    autocapitalize="sentences" autocorrect="on" spellcheck="true"></textarea>
          <div id="input-toolbar">
            <button id="attach-btn" title="Attach image">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
              </svg>
            </button>
            <button id="mic-btn" title="Voice input">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
                <line x1="8" y1="23" x2="16" y2="23"></line>
              </svg>
            </button>
            <button id="send" title="Send">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
            <button id="stop-btn" disabled title="Stop Claude (Esc)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              </svg>
            </button>
          </div>
        </div>
      </div>
      </div>
    </main>
  </div>

  <div id="pull-indicator">
    <svg class="pull-arrow" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"></line>
      <polyline points="19 12 12 19 5 12"></polyline>
    </svg>
    <div class="pull-spinner"><span class="spinner-sprite">👾</span></div>
  </div>

  <!-- Markdown + syntax highlighting: progressive enhancement. If a CDN is
       unreachable (offline sprite), app.js falls back to escaped plaintext. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" onerror="window.__noHljs=true"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js" onerror="window.__noMarked=true"></script>
  <script src="/app.js"></script>
</body>
</html>
